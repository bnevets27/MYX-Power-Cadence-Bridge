; PlatformIO Project Configuration
; ESP32 BLE Bike Power Meter Bridge
;
; Upload: Connect ESP32 via USB, then click Upload in PlatformIO
; Monitor: Use PlatformIO Serial Monitor at 115200 baud
;
; Two build environments:
;   pio run -e esp32     — Classic ESP32 (ESP32-WROOM-32, DevKitC)
;   pio run -e esp32s3   — ESP32-S3 (ESP32-S3-DevKitC, etc.)

[common]
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
lib_deps =
    tzapu/WiFiManager@^2.0.0
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7
build_flags = -DCORE_DEBUG_LEVEL=0

[env:esp32]
platform = espressif32
board = esp32dev
extends = common

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
extends = common
build_flags =
    ${common.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
