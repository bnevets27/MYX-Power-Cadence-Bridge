; PlatformIO Project Configuration
; ESP32 BLE Bike Power Meter Bridge
;
; Upload: Connect ESP32 via USB, then click Upload in PlatformIO
; Monitor: Use PlatformIO Serial Monitor at 115200 baud

[common]
framework = arduino
monitor_speed = 115200
lib_deps =
build_flags = -DCORE_DEBUG_LEVEL=0

[env:esp32]
platform = espressif32
board = esp32dev
extends = common
build_flags =
    ${common.build_flags}

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
extends = common
build_flags =
    ${common.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
