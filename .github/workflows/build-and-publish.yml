name: Build Firmware (CI)

# Compiles the Basic firmware on every push to main to verify it still builds.
# Releases (with both Basic + HA-MQTT binaries) are published from the
# ha-mqtt branch workflow when a v* tag is pushed there.

on:
  push:
    branches: [main]

jobs:
  build:
    name: Compile Basic Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile firmware
        run: pio run
