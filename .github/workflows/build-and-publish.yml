name: Build Firmware

# Compiles firmware on every push to main (CI).
# On a version tag (e.g. v1.0.1), produces a GitHub Release
# with a merged firmware.bin ready to flash via https://web.esphome.io

on:
  push:
    branches: [main]
    tags:     ['v*']

jobs:
  build:
    name: Compile & Package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO and esptool
        run: pip install platformio esptool

      - name: Compile firmware
        run: pio run

      - name: Merge into single flashable binary
        # Combines bootloader + partition table + app into one .bin
        # flashable at offset 0x0 via web.esphome.io or esptool.
        run: |
          BOOT_APP=$(find ~/.platformio -name boot_app0.bin | head -1)
          python -m esptool --chip esp32 merge_bin \
            --output firmware.bin \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x1000  .pio/build/esp32/bootloader.bin \
            0x8000  .pio/build/esp32/partitions.bin \
            0xe000  "$BOOT_APP" \
            0x10000 .pio/build/esp32/firmware.bin

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware.bin
          body: |
            ## Flash Instructions

            1. Download `firmware.bin` below
            2. Open [web.esphome.io](https://web.esphome.io) in Chrome or Edge
            3. Click **Install** → **Browse** → select `firmware.bin` → select your COM port → Flash
