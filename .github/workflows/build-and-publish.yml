name: Build And Publish Firmware

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.display_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - env: esp32
            display_name: ESP32
            chip: esp32
            chip_family: ESP32
            bootloader_offset: "0x1000"
            include_boot_app0: "true"
            flash_mode: dio
            flash_freq: 40m
            flash_size: 4MB
          - env: esp32s3
            display_name: ESP32-S3
            chip: esp32s3
            chip_family: ESP32-S3
            bootloader_offset: "0x0000"
            include_boot_app0: "false"
            flash_mode: dio
            flash_freq: 80m
            flash_size: 4MB

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install build tools
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run -e ${{ matrix.target.env }}

      - name: Package release files
        shell: bash
        run: |
          set -euo pipefail

          BUILD_DIR=".pio/build/${{ matrix.target.env }}"
          DIST_DIR="dist/${{ matrix.target.env }}"
          mkdir -p "${DIST_DIR}"

          cp "${BUILD_DIR}/firmware.bin" "${DIST_DIR}/myx-bridge-${{ matrix.target.env }}-ota.bin"
          cp "${BUILD_DIR}/bootloader.bin" "${DIST_DIR}/bootloader.bin"
          cp "${BUILD_DIR}/partitions.bin" "${DIST_DIR}/partitions.bin"

          if [[ "${{ matrix.target.include_boot_app0 }}" == "true" ]]; then
            cp "${HOME}/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin" "${DIST_DIR}/boot_app0.bin"
            python -m esptool --chip ${{ matrix.target.chip }} merge-bin \
              -o "${DIST_DIR}/myx-bridge-${{ matrix.target.env }}-factory.bin" \
              --flash-mode ${{ matrix.target.flash_mode }} \
              --flash-freq ${{ matrix.target.flash_freq }} \
              --flash-size ${{ matrix.target.flash_size }} \
              "${{ matrix.target.bootloader_offset }}" "${DIST_DIR}/bootloader.bin" \
              0x8000 "${DIST_DIR}/partitions.bin" \
              0xe000 "${DIST_DIR}/boot_app0.bin" \
              0x10000 "${DIST_DIR}/myx-bridge-${{ matrix.target.env }}-ota.bin"
          else
            python -m esptool --chip ${{ matrix.target.chip }} merge-bin \
              -o "${DIST_DIR}/myx-bridge-${{ matrix.target.env }}-factory.bin" \
              --flash-mode ${{ matrix.target.flash_mode }} \
              --flash-freq ${{ matrix.target.flash_freq }} \
              --flash-size ${{ matrix.target.flash_size }} \
              "${{ matrix.target.bootloader_offset }}" "${DIST_DIR}/bootloader.bin" \
              0x8000 "${DIST_DIR}/partitions.bin" \
              0x10000 "${DIST_DIR}/myx-bridge-${{ matrix.target.env }}-ota.bin"
          fi

          cat > "${DIST_DIR}/manifest-${{ matrix.target.env }}.json" <<EOF
          {
            "name": "MYX Power & Cadence Bridge",
            "version": "${GITHUB_REF_NAME}",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "${{ matrix.target.chip_family }}",
                "parts": [
                  {
                    "path": "./myx-bridge-${{ matrix.target.env }}-factory.bin",
                    "offset": 0
                  }
                ]
              }
            ]
          }
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: myx-bridge-${{ matrix.target.env }}
          path: dist/${{ matrix.target.env }}

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: myx-bridge-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release assets and notes
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/myx-bridge-esp32-ota.bin
            release-assets/myx-bridge-esp32-factory.bin
            release-assets/manifest-esp32.json
            release-assets/myx-bridge-esp32s3-ota.bin
            release-assets/myx-bridge-esp32s3-factory.bin
            release-assets/manifest-esp32s3.json
          body: |
            ## Pick the firmware that fits your setup

            ### Unified Firmware (${{ github.ref_name }})
            | File | Board / Use |
            |------|-------------|
            | `myx-bridge-esp32-factory.bin` | **ESP32** (WROOM-32, DevKitC) first-time USB flash via `web.esphome.io` |
            | `myx-bridge-esp32-ota.bin` | **ESP32** OTA update from `/update` page |
            | `myx-bridge-esp32s3-factory.bin` | **ESP32-S3** (S3-DevKitC, S3-WROOM) first-time USB flash via `web.esphome.io` |
            | `myx-bridge-esp32s3-ota.bin` | **ESP32-S3** OTA update from `/update` page |

            ## How to Flash

            1. Download the `*-factory.bin` for your board from the Assets below.
            2. Open **[web.esphome.io](https://web.esphome.io)** in Chrome or Edge.
            3. Plug in your ESP32 and place it in bootloader mode if needed.
            4. Click **Install** -> **Browse** -> select the factory `.bin` -> select your COM port -> Flash.

            ## Updating an Existing Device

            1. Open your bridge web UI and go to `/update`.
            2. Upload the matching `*-ota.bin` file for your board.
