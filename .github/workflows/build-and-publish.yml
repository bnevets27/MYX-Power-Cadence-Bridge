name: Build & Release Firmware

# CI: compiles both firmware variants on every push to ha-mqtt.
# Release: push any tag (e.g. 21.03.26 or v2.0.1) to trigger a GitHub Release
# with both the HA-MQTT and Basic .bin files attached as assets.

on:
  push:
    branches: [ha-mqtt]
    tags:     ['v*', '[0-9]*']

jobs:
  build-and-release:
    name: Build Firmware
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Check out both branches into separate subdirectories
      - name: Checkout ha-mqtt
        uses: actions/checkout@v4
        with:
          ref:  ha-mqtt
          path: ha-mqtt

      - name: Checkout main (basic)
        uses: actions/checkout@v4
        with:
          ref:  main
          path: basic

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('ha-mqtt/platformio.ini') }}-${{ hashFiles('basic/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO and esptool
        run: pip install platformio esptool

      - name: Build HA Edition firmware (ESP32 + S3)
        working-directory: ha-mqtt
        run: pio run

      - name: Build Basic Edition firmware
        working-directory: basic
        run: pio run

      - name: Extract firmware versions
        run: |
          HA_VER=$(sed -n 's/.*FW_VERSION\s*=\s*"\([^"]*\)".*/\1/p' ha-mqtt/src/main.cpp)
          BASIC_VER=$(sed -n 's/.*FW_VERSION\s*=\s*"\([^"]*\)".*/\1/p' basic/src/main.cpp)
          echo "HA_VER=$HA_VER"           >> $GITHUB_ENV
          echo "BASIC_VER=$BASIC_VER"     >> $GITHUB_ENV
          echo "HA_ESP32_BIN=esp32-bike-bridge-ha-mqtt-v${HA_VER}.bin"         >> $GITHUB_ENV
          echo "HA_S3_BIN=esp32s3-bike-bridge-ha-mqtt-v${HA_VER}.bin"          >> $GITHUB_ENV
          echo "BASIC_BIN=esp32-bike-bridge-basic-v${BASIC_VER}.bin"           >> $GITHUB_ENV
          echo "BASIC_S3_BIN=esp32s3-bike-bridge-basic-v${BASIC_VER}.bin"      >> $GITHUB_ENV

      - name: Package HA Edition — ESP32 (merge to flashable .bin)
        run: |
          BOOT_APP="$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"
          echo "boot_app0.bin: $BOOT_APP"
          python -m esptool --chip esp32 merge-bin \
            --output "$HA_ESP32_BIN" \
            --flash-mode dio --flash-freq 40m --flash-size 4MB \
            0x1000  ha-mqtt/.pio/build/esp32/bootloader.bin \
            0x8000  ha-mqtt/.pio/build/esp32/partitions.bin \
            0xe000  "$BOOT_APP" \
            0x10000 ha-mqtt/.pio/build/esp32/firmware.bin

      - name: Package HA Edition — ESP32-S3 (merge to flashable .bin)
        run: |
          BOOT_APP="$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"
          echo "boot_app0.bin: $BOOT_APP"
          python -m esptool --chip esp32s3 merge-bin \
            --output "$HA_S3_BIN" \
            --flash-mode dio --flash-freq 80m --flash-size 4MB \
            0x0     ha-mqtt/.pio/build/esp32s3/bootloader.bin \
            0x8000  ha-mqtt/.pio/build/esp32s3/partitions.bin \
            0xe000  "$BOOT_APP" \
            0x10000 ha-mqtt/.pio/build/esp32s3/firmware.bin

      - name: Package Basic Edition — ESP32 (merge to flashable .bin)
        run: |
          BOOT_APP=$(find ~/.platformio -name boot_app0.bin -path "*/esp32/*" | head -1)
          echo "boot_app0.bin: $BOOT_APP"
          if [ -n "$BOOT_APP" ]; then
            python -m esptool --chip esp32 merge-bin \
              --output "$BASIC_BIN" \
              --flash-mode dio --flash-freq 40m --flash-size 4MB \
              0x1000  basic/.pio/build/esp32/bootloader.bin \
              0x8000  basic/.pio/build/esp32/partitions.bin \
              0xe000  "$BOOT_APP" \
              0x10000 basic/.pio/build/esp32/firmware.bin
          else
            python -m esptool --chip esp32 merge-bin \
              --output "$BASIC_BIN" \
              --flash-mode dio --flash-freq 40m --flash-size 4MB \
              0x1000  basic/.pio/build/esp32/bootloader.bin \
              0x8000  basic/.pio/build/esp32/partitions.bin \
              0x10000 basic/.pio/build/esp32/firmware.bin
          fi

      - name: Package Basic Edition — ESP32-S3 (merge to flashable .bin)
        run: |
          BOOT_APP=$(find ~/.platformio -name boot_app0.bin -path "*/esp32s3/*" | head -1)
          echo "boot_app0.bin: $BOOT_APP"
          if [ -n "$BOOT_APP" ]; then
            python -m esptool --chip esp32s3 merge-bin \
              --output "$BASIC_S3_BIN" \
              --flash-mode dio --flash-freq 80m --flash-size 4MB \
              0x0     basic/.pio/build/esp32s3/bootloader.bin \
              0x8000  basic/.pio/build/esp32s3/partitions.bin \
              0xe000  "$BOOT_APP" \
              0x10000 basic/.pio/build/esp32s3/firmware.bin
          else
            python -m esptool --chip esp32s3 merge-bin \
              --output "$BASIC_S3_BIN" \
              --flash-mode dio --flash-freq 80m --flash-size 4MB \
              0x0     basic/.pio/build/esp32s3/bootloader.bin \
              0x8000  basic/.pio/build/esp32s3/partitions.bin \
              0x10000 basic/.pio/build/esp32s3/firmware.bin
          fi

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.HA_ESP32_BIN }}
            ${{ env.HA_S3_BIN }}
            ${{ env.BASIC_BIN }}
            ${{ env.BASIC_S3_BIN }}
          body: |
            ## Pick the firmware that fits your setup

            ### Home Assistant / MQTT Edition (v${{ env.HA_VER }})
            | File | Chip |
            |------|------|
            | `${{ env.HA_ESP32_BIN }}` | **ESP32** (WROOM-32, DevKitC) |
            | `${{ env.HA_S3_BIN }}` | **ESP32-S3** (S3-DevKitC, S3-WROOM) |

            ### Basic BLE Bridge (v${{ env.BASIC_VER }})
            | File | Chip |
            |------|------|
            | `${{ env.BASIC_BIN }}` | **ESP32** (WROOM-32, DevKitC) |
            | `${{ env.BASIC_S3_BIN }}` | **ESP32-S3** (S3-DevKitC, S3-WROOM) |

            ## How to Flash

            1. Download the `.bin` for your board from the Assets below
            2. Open **[web.esphome.io](https://web.esphome.io)** in Chrome or Edge
            3. Click **Install** → **Browse** → select the `.bin` → select your COM port → Flash

            > **Upgrading from pre-v2.0.3 or from the Basic firmware?**
            > The HA edition uses a new dual-OTA partition table — flash via USB once, then all future updates can be done wirelessly from the device's web UI (`http://<device-ip>/update`).
